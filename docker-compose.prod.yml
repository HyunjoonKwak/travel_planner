services:
  travel-planner:
    image: ghcr.io/${GHCR_USERNAME:-hyunjoonkwak}/travel-planner:${IMAGE_TAG:-latest}
    container_name: travel-planner
    ports:
      - "3900:3000"
    volumes:
      - ./data:/app/data
    environment:
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
